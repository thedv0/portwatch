# portwatch example configuration
# Copy this file to portwatch.yaml and adjust as needed.

# How often to scan open ports (e.g. 30s, 1m, 5m)
interval: 30s

# Path for storing state and history files
state_dir: /var/lib/portwatch

# Snapshot retention policy
cleaner:
  # Remove snapshots older than this duration (0 = disabled)
  max_age: 168h   # 7 days
  # Keep at most this many snapshot files (0 = disabled)
  max_files: 50

# Alert output format: text | json
alert_format: text

# Report output format: text | json
report_format: text

# Rules define which ports are expected to be open.
# Ports not matching any allow rule will trigger an alert.
rules:
  # Allow SSH on all interfaces
  - port: 22
    protocol: tcp
    action: allow
    description: SSH

  # Allow HTTP
  - port: 80
    protocol: tcp
    action: allow
    description: HTTP

  # Allow HTTPS
  - port: 443
    protocol: tcp
    action: allow
    description: HTTPS

  # Deny a specific port explicitly (alerts even if in an allow range)
  - port: 8080
    protocol: tcp
    action: deny
    description: Disallowed alternate HTTP

  # Allow a range of ports for internal services
  - port_range: "9000-9100"
    protocol: tcp
    action: allow
    description: Internal service range
